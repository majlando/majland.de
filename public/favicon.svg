<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="majland.de">
  <!-- The "{ }" mark in slate-teal — the brand signal. Dark tile by default;
       the tab/bookmark chrome follows the OS theme, so light mode is an
       override, not JS. -->
  <style>
    .bg { fill: #181a1e; }
    .fg { stroke: #5cb6c2; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f3eee3; }
      .fg { stroke: #2f6e78; }
    }
  </style>
  <rect class="bg" width="64" height="64" rx="15"/>
  <rect class="fg" x="1.5" y="1.5" width="61" height="61" rx="13.5" fill="none" stroke-width="2" opacity="0.45"/>
  <g class="fg" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M26 16c-6 0-7 4-7 8s0 7-5 8c5 1 5 4 5 8s1 8 7 8"/>
    <path d="M38 16c6 0 7 4 7 8s0 7 5 8c-5 1-5 4-5 8s-1 8-7 8"/>
  </g>
</svg>
