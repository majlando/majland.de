    <meta name="theme-color" content="#0c0e14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)" />
    <link rel="canonical" href="https://majland.de/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="majland.de" />
    <meta property="og:title" content="majland.de — Curated paths to learn software" />
    <meta

      content="Focused paths through the best free courses — programming, the web, full-stack, tools and AI. In EN, DE & DA."

    <meta property="og:url" content="https://majland.de/" />
    <meta property="og:image" content="https://majland.de/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Set theme + language before first paint to avoid a flash. -->
    <script>
      (function () {
        var d = document.documentElement;
        try {
          var t = localStorage.getItem('mjl-theme');
          d.dataset.theme =
            t || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        } catch (e) {}
        try {
          var l = localStorage.getItem('mjl-lang');
          if (!l) {
            var n = (navigator.language || 'en').slice(0, 2).toLowerCase();
            l = n === 'de' || n === 'da' ? n : 'en';
          }
          d.dataset.lang = l;
          d.lang = l;
        } catch (e) {}
      })();
    </script>

    <!-- App entry — bundled by Vite. -->
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#app" data-i18n="skip">Skip to content</a>
    <div class="scroll-progress" aria-hidden="true"><span id="scrollBar"></span></div>

    <header class="site-header">
      <div class="wrap site-header__inner">
        <a class="brand" href="#/" aria-label="majland.de">
          <span class="brand__mark" aria-hidden="true">{ }</span>
          <span class="brand__text">majland<span class="brand__dot">.de</span></span>
        </a>

        <nav class="primary-nav" aria-label="Primary">
          <a href="#/" data-i18n="nav_paths">Paths</a>
          <a href="#reference" data-i18n="nav_reference">Reference</a>
          <a href="#method" data-i18n="nav_method">How to learn</a>
        </nav>

        <div class="header-controls">
          <div class="lang" id="langSwitch" role="group" aria-label="Language">
            <button type="button" data-lang="en" aria-pressed="true">EN</button>
            <button type="button" data-lang="de" aria-pressed="false">DE</button>
            <button type="button" data-lang="da" aria-pressed="false">DA</button>
          </div>
          <button
            id="themeToggle"
            class="theme-toggle"
            type="button"
            aria-pressed="false"
            aria-label="Switch colour theme"
          >
            <svg
              class="icon icon--sun"
              viewBox="0 0 24 24"
              width="18"
              height="18"
              aria-hidden="true"
            >
              <circle
                cx="12"
                cy="12"
                r="4.2"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              />
              <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <line x1="12" y1="2.5" x2="12" y2="5" />
                <line x1="12" y1="19" x2="12" y2="21.5" />
                <line x1="2.5" y1="12" x2="5" y2="12" />
                <line x1="19" y1="12" x2="21.5" y2="12" />
                <line x1="4.9" y1="4.9" x2="6.7" y2="6.7" />
                <line x1="17.3" y1="17.3" x2="19.1" y2="19.1" />
                <line x1="4.9" y1="19.1" x2="6.7" y2="17.3" />
                <line x1="17.3" y1="6.7" x2="19.1" y2="4.9" />
              </g>
            </svg>
            <svg
              class="icon icon--moon"
              viewBox="0 0 24 24"
              width="18"
              height="18"
              aria-hidden="true"
            >
              <path
                d="M20 14.5A8 8 0 1 1 9.5 4a6.3 6.3 0 0 0 10.5 10.5Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main id="app" tabindex="-1"><!-- rendered by app.js --></main>
