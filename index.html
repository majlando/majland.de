    <!-- Set the theme before first paint to avoid a flash. The page's language
         is fixed by the URL (pre-rendered), so it isn't touched here. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mjl-theme');
          document.documentElement.dataset.theme =
            t || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        } catch (e) {}
      })();
    </script>

    <!-- App entry — bundled by Vite. -->
    <script type="module" src="/src/main.js"></script>

    <a class="skip-link" href="#app" data-i18n="skip">Skip to content</a>
    <div class="scroll-progress" aria-hidden="true"><span id="scrollBar"></span></div>

    <header class="site-header">

              class="icon icon--sun"
              viewBox="0 0 24 24"
              width="18"
              height="18"

                cx="12"

                r="4.2"
                fill="none"
                stroke="currentColor"

              />

            <svg
              class="icon icon--moon"
              viewBox="0 0 24 24"
              width="18"
              height="18"
              aria-hidden="true"
            >
              <path
                d="M20 14.5A8 8 0 1 1 9.5 4a6.3 6.3 0 0 0 10.5 10.5Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
